name: Build Debug APK

# Tự động chạy khi push hoặc tạo pull request vào nhánh bất kỳ
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:   # Cho phép chạy thủ công từ GitHub UI

jobs:
  build:
    name: Build FDroid Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài Java 21 (bắt buộc cho AGP 8.x và Kotlin 2.x)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # 3. Cài NDK đúng phiên bản — project yêu cầu 28.2.13676358
      #    ANDROID_NDK_LATEST_HOME thường trỏ đến phiên bản cũ hơn trên runner,
      #    gây lỗi "NDK not found" hoặc mismatch khi build C++ native code.
      - name: Install NDK 28.2.13676358
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;28.2.13676358" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            2>&1 | tail -5

      # 4. Trỏ biến môi trường NDK đến đúng phiên bản vừa cài
      - name: Set NDK environment variables
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/28.2.13676358"
          echo "ANDROID_NDK=$NDK_PATH"         >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH"    >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_PATH"    >> $GITHUB_ENV

      # 5. Cache Gradle để tăng tốc build lần sau
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 6. Build debug APK (không cần keystore)
      - name: Build Debug APK
        run: ./gradlew assembleFDroidDebug --stacktrace --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"

      # 7. Upload APK thành artifact để download
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: smartautoclicker-fdroid-debug-${{ github.run_number }}
          path: smartautoclicker/build/outputs/apk/fDroid/debug/*.apk
          retention-days: 14
